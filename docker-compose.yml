services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spapp
      POSTGRES_PASSWORD: spapp_dev
      POSTGRES_DB: spapp
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spapp -d spapp']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://spapp:spapp_dev@db:5432/spapp
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
